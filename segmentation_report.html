<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Segmentation Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --paper:#F5F1E8; --ink:#1C2B3A; --ink-soft:#4C5C6B; --line:#D9D2C0;
    --accent:#C1602E; --panel:#FFFDF8;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1300px;margin:0 auto;padding:28px 32px 60px;}
  header{border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:22px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:36px;margin:0;letter-spacing:-0.01em;}
  .subtitle{color:var(--ink-soft);font-size:14px;margin-top:6px;max-width:640px;}

  .row-2{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;margin-bottom:20px;}
  .panel{background:var(--panel);border:1px solid var(--line);padding:18px 20px;}
  .panel h4{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 12px;}

  .segments{display:grid;grid-template-columns:repeat(auto-fit, minmax(210px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:20px;}
  .seg-card{background:var(--panel);padding:16px 18px;}
  .seg-card .swatch{width:14px;height:14px;display:inline-block;margin-right:8px;vertical-align:middle;}
  .seg-card .name{font-weight:600;font-size:13px;}
  .seg-card .stat{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);margin-top:8px;line-height:1.7;}

  select{font-family:'Inter',sans-serif;padding:7px 10px;border:1px solid var(--line);background:#fff;font-size:12.5px;margin-bottom:10px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--ink);padding:7px 5px;position:sticky;top:0;background:var(--panel);}
  tbody td{padding:6px 5px;border-bottom:1px solid var(--line);font-family:'IBM Plex Mono',monospace;}
  .table-scroll{max-height:320px;overflow-y:auto;}
  @media(max-width:880px){.row-2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Project 2 — Customer Analytics</div>
    <h1>Customer Segmentation Report</h1>
    <div class="subtitle">K-Means clustering on income and spending behavior, grouping customers into segments a marketing team can act on.</div>
  </header>

  <div class="segments" id="segCards"></div>

  <div class="row-2">
    <div class="panel">
      <h4>Segments — Income vs. Spending Score</h4>
      <canvas id="scatterChart" height="240"></canvas>
    </div>
    <div class="panel">
      <h4>Elbow Method (choosing k)</h4>
      <canvas id="elbowChart" height="240"></canvas>
    </div>
  </div>

  <div class="panel">
    <h4>Customer Detail</h4>
    <select id="segFilter"><option value="all">All segments</option></select>
    <div class="table-scroll">
      <table>
        <thead><tr><th>ID</th><th>Age</th><th>Gender</th><th>Income (k$)</th><th>Spend Score</th><th>Segment</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

const palette = ['#C1602E', '#1C2B3A', '#7C9885', '#D9A567', '#4C5C6B', '#A65D8E'];

function init(){
  const summary = SEG_DATA.cluster_summary;
  const cards = document.getElementById('segCards');
  cards.innerHTML = summary.map((s,i)=>`
    <div class="seg-card">
      <div class="name"><span class="swatch" style="background:${palette[i%palette.length]}"></span>${s.Label}</div>
      <div class="stat">
        ${s.Count} customers<br>
        Avg age: ${s.AvgAge}<br>
        Avg income: $${s.AvgIncome}k<br>
        Avg spend score: ${s.AvgSpend}
      </div>
    </div>`).join('');

  // Scatter
  const datasets = summary.map((s,i)=>({
    label: `C${s.Cluster}: ${s.Label}`,
    data: SEG_DATA.points.filter(p=>p.Cluster===s.Cluster).map(p=>({x:p['Annual Income (k$)'], y:p['Spending Score (1-100)']})),
    backgroundColor: palette[i%palette.length],
    pointRadius: 4
  }));
  new Chart(document.getElementById('scatterChart'), {
    type:'scatter',
    data:{ datasets },
    options:{
      plugins:{legend:{position:'bottom', labels:{font:{family:'IBM Plex Mono',size:10}, boxWidth:10}}},
      scales:{
        x:{title:{display:true,text:'Annual Income (k$)',font:{size:11}}},
        y:{title:{display:true,text:'Spending Score (1-100)',font:{size:11}}}
      }
    }
  });

  // Elbow
  new Chart(document.getElementById('elbowChart'), {
    type:'line',
    data:{ labels: SEG_DATA.elbow.k, datasets:[{
      label:'Inertia', data: SEG_DATA.elbow.inertia,
      borderColor:'#C1602E', backgroundColor:'rgba(193,96,46,0.08)', fill:true, tension:0.2
    }]},
    options:{ plugins:{legend:{display:false}}, scales:{x:{title:{display:true,text:'k (clusters)'}}, y:{title:{display:true,text:'Inertia'}}} }
  });

  // Table + filter
  const segSelect = document.getElementById('segFilter');
  [...new Set(SEG_DATA.points.map(p=>p.Segment))].forEach(s=>{
    const o = document.createElement('option'); o.value=s; o.textContent=s; segSelect.appendChild(o);
  });
  const renderTable = () => {
    const f = segSelect.value;
    const rows = SEG_DATA.points.filter(p => f==='all' || p.Segment===f).slice(0,200);
    document.getElementById('tbody').innerHTML = rows.map(p=>`
      <tr><td>${p.CustomerID}</td><td>${p.Age}</td><td>${p.Gender}</td>
      <td>${p['Annual Income (k$)']}</td><td>${p['Spending Score (1-100)']}</td>
      <td>${p.Segment}</td></tr>`).join('');
  };
  segSelect.onchange = renderTable;
  renderTable();
}
init();
